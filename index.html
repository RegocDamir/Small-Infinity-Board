<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Canvas</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700&family=Roboto:wght@400;700&display=swap');

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #f3ebe1;
            --dot-color: #343131;
            --bar-bg: rgba(30, 24, 26, 0.96);
            --bar-border: rgba(255, 255, 255, 0.08);
            --accent: #c8ff00;
            --accent2: #00d4ff;
            --node-border: rgba(255, 255, 255, 0.15);
            --node-bg: rgba(28, 22, 24, 0.97);
            --text: #e8e8e8;
            --muted: #7a6a6e;
            --conn-color: #3e383b;
            --port-bg: #666;
            --port-border: #333;
            --port-hover: #999;
            --dot-icon: var(--muted);
            --tb-hover-bg: rgba(255, 255, 255, 0.06);
            --tb-hover-border: rgba(255, 255, 255, 0.09);
            --tb-active-bg: rgba(253, 253, 253, 0.08);
            --tb-active-border: rgba(253, 253, 253, 0.25);
            --tb-active-glow: 0 0 10px rgba(253, 253, 253, 0.12), 0 0 20px rgba(253, 253, 253, 0.06);
            --tb-icon-active-glow: 0 0 10px rgba(253, 253, 253, 0.12);
            --tb-active-text: #fdfdfd;
            --tb-hover-text: var(--text);
            --placeholder-color: rgba(255, 255, 255, 0.2);
            --ctx-text: var(--text);
            --pulse-color: var(--conn-color);
        }

        body.light {
            --bg: #edddd4;
            --dot-color: #afa38f;
            --node-bg: #197278;
            --bar-bg: rgba(255, 255, 255, 0.92);
            --bar-border: rgba(0, 0, 0, 0.08);
            --conn-color: #3b878c;
            --port-bg: #197278;
            --port-border: #3b878c;
            --port-hover: #2199a1;
            --dot-icon: #0f464a;
            --tb-hover-bg: rgba(0, 110, 255, 0.15);
            --tb-hover-border: rgba(0, 110, 255, 0.5);
            --tb-active-bg: rgba(0, 110, 255, 0.15);
            --tb-active-border: rgba(0, 110, 255, 0.6);
            --tb-active-glow: 0 0 15px rgba(0, 110, 255, 0.4), 0 0 30px rgba(0, 110, 255, 0.2);
            --tb-icon-active-glow: 0 0 15px rgba(0, 110, 255, 0.4);
            --tb-active-text: #006eff;
            --tb-hover-text: #006eff;
            --placeholder-color: #0d383b;
            --ctx-text: #197278;
            --pulse-color: #197278;
        }

        body.light .node-img-area,
        body.light .node-video-area {
            background: #ff751f;
            border: 1.2px solid #c0393f;
        }

        body.light .node-img-area {
            border-style: solid;
        }

        body.light .node-text-input {
            background: #737373;
            border: 1.2px solid #c0393f;
            color: #fff;
        }

        body.light .node-text-input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        body {
            background: var(--bg);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            font-family: 'DM Mono', monospace;
            user-select: none;
        }

        #canvas-wrap {
            position: fixed;
            inset: 0;
            overflow: hidden;
            cursor: default;
        }

        #canvas-wrap.panning {
            cursor: grabbing;
        }

        #canvas-wrap.adding {
            cursor: crosshair;
        }

        #dot-grid {
            position: absolute;
            inset: 0;
            background-image: radial-gradient(circle, var(--dot-color) 1.5px, transparent 1.5px);
            background-size: 32px 32px;
            pointer-events: none;
        }

        #scene {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            transform-origin: 0 0;
        }

        /* â”€â”€ GROUP CONTAINER â”€â”€ */
        .node-is-group {
            background: rgba(255, 255, 255, 0.02);
            border: 1.5px dashed var(--bar-border);
            box-shadow: none;
            pointer-events: auto;
            cursor: grab;
            z-index: 1;
            padding: 0 14px 14px 14px;
        }

        .node-is-group:active {
            cursor: grabbing;
        }

        .node-is-group .node-body {
            background: #f3ebe1;
            border-radius: 8px;
            margin: 0 4px 4px 4px;
            padding: 4px;
            pointer-events: none;
        }

        .node-is-group>.node-inner {
            pointer-events: none;
        }

        .node-is-group>.node-inner>.node-header {
            pointer-events: auto;
            cursor: grab;
            /* Allow grabbing the group header to move it */
        }

        body.light .node-is-group {
            background: #fdfdfd;
            border: 2px solid #000;
        }

        body.light .node-is-group .node-body {
            background: #f3ebe1;
            border: 2px solid #ff751f;
            border-radius: 8px;
            margin: 0 4px 4px 4px;
            padding: 4px;
        }

        body.light .node-is-group .node-title {
            color: #000;
            font-weight: 700;
        }

        body.light .node-is-group .node-title::placeholder {
            color: rgba(0, 0, 0, 0.5);
        }

        body.light .node-is-group .node-act-btn {
            color: #000;
        }

        body.light .node-act-btn {
            color: #ff751f;
        }

        .node-container-area {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        svg#connections {
            position: absolute;
            top: -10000px;
            left: -10000px;
            width: 20000px;
            height: 20000px;
            pointer-events: none;
            z-index: 10;
        }

        /* â”€â”€ SELECTION BOX â”€â”€ */
        #selection-box {
            position: fixed;
            border: 1.5px dashed rgba(0, 110, 255, 0.6);
            background: rgba(0, 110, 255, 0.05);
            pointer-events: none;
            z-index: 2000;
            display: none;
        }

        body.light #selection-box {
            border-color: rgba(0, 110, 255, 0.6);
            background: rgba(0, 110, 255, 0.05);
        }

        /* â”€â”€ TOOLBAR â”€â”€ */
        #toolbar {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            perspective: 1200px;
        }

        #tb-flipcard {
            transform-style: preserve-3d;
            transition: transform 0.55s cubic-bezier(.65, 0, .35, 1);
            position: relative;
            border-radius: 9px;
        }

        body.anim-mode #tb-flipcard { transform: rotateX(180deg); }

        .tb-face {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 8px 14px;
            border-radius: 9px;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }

        .tb-front {
            background: var(--bar-bg);
            border: 1px solid var(--bar-border);
            backdrop-filter: blur(24px);
            box-shadow: 7px 11px 48px rgba(0, 110, 255, 0.31), 0 0 0 1px rgba(255, 255, 255, 0.03) inset;
        }

        body.light .tb-front {
            border: 1px solid #ff751f;
            box-shadow: 0 0 0 1px #ff751f inset, 7px 11px 48px rgba(0, 110, 255, 0.31);
        }

        .tb-back {
            position: absolute;
            inset: 0;
            transform: rotateX(180deg);
            background: linear-gradient(
                    180deg,
                    rgba(0, 200, 218, 0.97) 0%,
                    rgba(0, 80, 98, 0.97) 100%
                );
            border: 1px solid rgba(0, 225, 238, 0.55);
            backdrop-filter: blur(24px);
            box-shadow:
                0 0 7px   rgba(0, 215, 235, 0.45),
                0 0 25px  rgba(0, 200, 225, 0.33),
                0 0 50px  rgba(0, 180, 215, 0.19),
                0 0 80px  rgba(0, 160, 200, 0.09);
            min-width: 100%;
        }

        .tb-back .tb-btn { color: rgb(0, 235, 245); }
        .tb-back .tb-btn:hover { background: rgba(255,255,255,0.18); color: #fff; border-color: rgba(255,255,255,0.5); box-shadow: 0 0 12px rgba(255,255,255,0.25); }
        .tb-back .tb-btn.active { background: rgba(255,255,255,0.2); color: #fff; border-color: rgba(255,255,255,0.6); box-shadow: 0 0 14px rgba(255,255,255,0.3); }
        .tb-back .tb-icon-btn { color: rgb(0, 235, 245); }
        .tb-back .tb-icon-btn:hover { background: rgba(255,255,255,0.18); color: #fff; box-shadow: 0 0 10px rgba(255,255,255,0.2); }
        .tb-back .tb-sep { background: rgba(0, 220, 230, 0.35); }
        .tb-back #tb-logo-b { background-color: rgba(0,0,0,0.08); border-color: rgba(0,240,255,0.2); }

        #tb-logo-b {
            width: 48px;
            height: 48px;
            border-radius: 6px;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            flex-shrink: 0;
            cursor: pointer;
            margin: -6px 3px;
            transition: all 0.15s;
            border: 1px dashed rgba(0, 240, 255, 0.25);
        }
        #tb-logo-b:hover { background-color: rgba(0,0,0,0.15); border-color: rgba(0,240,255,0.5); }
        #tb-logo-b.has-logo { background-color: transparent !important; border-color: transparent !important; }

        .tb-sep {
            width: 1px;
            height: 22px;
            background: var(--bar-border);
            flex-shrink: 0;
            margin: 0 2px;
        }

        .tb-label {
            font-size: 8.5px;
            letter-spacing: 0.16em;
            color: var(--muted);
            text-transform: uppercase;
            padding: 0 2px;
            font-family: 'Syne', sans-serif;
        }

        #tb-logo {
            width: 48px;
            height: 48px;
            border-radius: 6px;
            background-color: rgba(255, 255, 255, 0.04);
            border: 1px dashed rgba(255, 255, 255, 0.25);
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            flex-shrink: 0;
            cursor: pointer;
            margin: -6px 3px;
            transition: all 0.15s;
        }

        #tb-logo:hover {
            background-color: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.4);
        }

        #tb-logo.has-logo {
            background-color: transparent !important;
            border-color: transparent !important;
        }

        body.light #tb-logo {
            background-color: rgba(0, 0, 0, 0.03);
            border-color: rgba(0, 0, 0, 0.15);
        }

        body.light #tb-logo:hover {
            background-color: rgba(0, 0, 0, 0.06);
            border-color: rgba(0, 0, 0, 0.3);
        }

        .tb-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            background: none;
            border: 1px solid transparent;
            border-radius: 5px;
            padding: 5px 10px;
            cursor: pointer;
            transition: all 0.15s;
            font-family: 'DM Mono', monospace;
            font-size: 8.5px;
            color: var(--muted);
            min-width: 44px;
        }

        .tb-btn:hover {
            background: var(--tb-hover-bg);
            color: var(--tb-hover-text);
            border-color: var(--tb-hover-border);
        }

        .tb-btn.active {
            background: var(--tb-active-bg);
            color: var(--tb-active-text);
            border-color: var(--tb-active-border);
            box-shadow: var(--tb-active-glow);
        }

        .tb-btn svg {
            flex-shrink: 0;
            transform: scale(0.9);
        }
        #btn-kframe { white-space: nowrap; }
        #btn-kframe.kframe-active path {
            fill: #c0393f;
            transition: fill 0.15s;
        }
        #btn-cam-zoom.zoom-active {
            box-shadow: 0 0 7px rgba(255,150,20,0.85), 0 0 22px rgba(255,120,0,0.45);
            border-color: rgba(255,150,20,0.55) !important;
        }
        #btn-cam-zoom.zoom-zoomed {
            box-shadow: 0 0 7px rgba(210,45,45,0.90), 0 0 22px rgba(185,25,25,0.48);
            border-color: rgba(210,45,45,0.55) !important;
        }
        #btn-flip-frame.flip-active {
            box-shadow: 0 0 7px rgba(100,200,255,0.85), 0 0 22px rgba(60,160,255,0.45);
            border-color: rgba(100,180,255,0.55) !important;
        }
        .node-back-face {
            position: absolute;
            inset: 0;
            border-radius: 8px;
            display: none;
            z-index: 12;
            pointer-events: auto;
            padding: 8px;
            cursor: pointer;
        }
        .node.node-flipped .node-inner {
            visibility: hidden;
        }
        .node.node-flipped .node-back-face {
            display: flex;
            align-items: flex-start;
            justify-content: flex-start;
        }
        .node.node-flipped {
            border-width: 2px;
        }

        /* ---- HTML NODE ---- */
        .node-html-area {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }
        .node-html-code {
            width: 100%;
            height: 100%;
            resize: none;
            background: #141414;
            color: #d4d4d4;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            border: none;
            padding: 8px;
            box-sizing: border-box;
            line-height: 1.55;
            outline: none;
        }
        .node-html-frame {
            display: none;
            width: 100%;
            height: 100%;
            border: none;
            background: #fff;
            border-radius: 0 0 6px 6px;
        }
        .node-html-toggle {
            font-size: 11px;
            line-height: 1;
            padding: 2px 5px !important;
        }

        .tb-icon-btn {
            background: none;
            border: 1px solid transparent;
            border-radius: 5px;
            padding: 0;
            cursor: pointer;
            color: var(--muted);
            transition: all 0.15s;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
        }

        .tb-icon-btn:hover {
            background: var(--tb-hover-bg);
            color: var(--tb-hover-text);
        }

        .tb-icon-btn:active {
            color: var(--tb-active-text);
            box-shadow: var(--tb-icon-active-glow);
        }

        #tb-drag-handle {
            width: 16px;
            height: 28px;
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.15);
            flex-shrink: 0;
        }

        #tb-drag-handle:active {
            cursor: grabbing;
        }

        #theme-toggle, #theme-toggle-b {
            background: none !important;
            border: none !important;
            box-shadow: none !important;
            outline: none !important;
            padding: 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            flex-shrink: 0;
            transition: transform 0.15s, opacity 0.15s;
        }
        #theme-toggle:hover, #theme-toggle-b:hover { transform: scale(1.12); opacity: 0.9; }

        body.light #tb-drag-handle, body.light .tb-drag-handle-b {
            color: rgba(0, 0, 0, 0.35);
        }

        /* ── MODE FLIP BUTTON ── */
        #btn-mode-flip, #btn-mode-flip-b {
            background: none;
            border: 1px solid transparent;
            border-radius: 5px;
            cursor: pointer;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            padding: 0;
            transition: all 0.15s;
            /* dark mode = white @80% */
            color: rgba(255, 255, 255, 0.80);
        }
        #btn-mode-flip:hover, #btn-mode-flip-b:hover { color: #ffffff; }
        /* light/color mode = cyan */
        body.light #btn-mode-flip, body.light #btn-mode-flip-b {
            color: rgb(0, 220, 240);
        }
        body.light #btn-mode-flip:hover, body.light #btn-mode-flip-b:hover {
            color: rgb(0, 255, 255);
        }
        /* animate mode = orange */
        body.anim-mode #btn-mode-flip-b {
            color: #ff751f;
        }
        body.anim-mode #btn-mode-flip-b:hover {
            color: #ff9040;
        }

        .tb-drag-handle-b {
            width: 16px;
            height: 28px;
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(0, 40, 50, 0.4);
            flex-shrink: 0;
        }
        .tb-drag-handle-b:active { cursor: grabbing; }

        /* ── ANIMATE MODE BACKGROUND ── */

            position: absolute;

        }
        .node.node-is-stack > .node-inner {
            overflow: visible;
        }
        .node.node-is-stack .node-header {
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .node.node-is-stack .node-title {
            color: #d8eaff;
        }
        .node.node-is-stack .node-title::placeholder {
            color: rgba(180,210,255,0.5);
        }
        .node.node-is-stack .node-act-btn {
            color: #c0393f;
        }

        /* ── STACK EAR (satellite pill, sibling to .node in the scene) ── */
        .stack-ear {
            position: absolute;
            width: 35px;
            height: 92px;
            border-radius: 18px;
            z-index: 3;
            background: #2b4866;
            border: 2px solid #1e3650;
            box-shadow: 0 8px 22px rgba(0,0,0,0.38), 0 2px 6px rgba(0,0,0,0.25);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            cursor: grab;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .stack-ear:active { cursor: grabbing; }
        .stack-ear:hover,
        .stack-ear.ear-hover {
            border-color: rgba(92,225,230,0.45);
        }
        .stack-ear.ear-focused {
            border-color: #5ce1e6;
            box-shadow: 0 0 0 3px rgba(92,225,230,0.5), 0 0 18px rgba(92,225,230,0.45), 0 8px 22px rgba(0,0,0,0.38), 0 2px 6px rgba(0,0,0,0.25);
        }

        /* Top half: hatch grab zone */
        .stack-ear-grab {
            flex: 1;
            background: repeating-linear-gradient(
                -45deg,
                transparent, transparent 3px,
                rgba(255,255,255,0.09) 3px, rgba(255,255,255,0.09) 4.5px
            );
            transition: background 0.2s, box-shadow 0.2s;
        }
        .stack-ear.ear-focused .stack-ear-grab {
            background:
                repeating-linear-gradient(
                    -45deg,
                    transparent, transparent 3px,
                    rgba(255,255,255,0.13) 3px, rgba(255,255,255,0.13) 4.5px
                ),
                rgba(92, 225, 230, 0.2);
            box-shadow: inset 0 0 14px rgba(92, 225, 230, 0.45);
        }

        /* Bottom half: eject button */
        .stack-ear-eject {
            height: 38px;
            flex-shrink: 0;
            background: none;
            border: none;
            border-top: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #5ce1e6;
            transition: background 0.12s;
        }
        .stack-ear-eject:hover {
            background: rgba(255,255,255,0.1);
        }
        .stack-ear-eject svg {
            width: 14px;
            height: 14px;
            pointer-events: none;
        }

        .node-stack-area {
            width: 100%;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
            overflow: visible;
            border-radius: 6px;
            min-height: 80px;
        }

        /* Empty state — magnet icon */
        .stack-empty-hint {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 16px 8px;
            color: rgba(160,200,255,0.45);
            font-size: 9.5px;
            text-align: center;
            letter-spacing: 0.08em;
        }
        .stack-empty-hint svg {
            width: 32px;
            height: 32px;
            opacity: 0.5;
        }

        /* Stacked cards — straight list layout */
        .stack-card {
            position: relative;
            width: 100%;
            background: #1e3255;
            border: 1.5px solid rgba(255,255,255,0.12);
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.25);
            transition: box-shadow 0.15s;
            flex-shrink: 0;
        }
        .stack-card:hover {
            box-shadow: 0 4px 14px rgba(0,0,0,0.35);
        }

        .stack-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 10px;
            font-size: 11px;
            font-family: 'Roboto', sans-serif;
            font-weight: 700;
            color: #d0e4ff;
        }
        .stack-card-header .stack-card-dots {
            display: flex;
            gap: 2px;
        }
        .stack-card-header .stack-card-dots .dot-circle {
            background: #c0393f;
        }

        .stack-card-content {
            padding: 6px 10px 8px;
            font-size: 11px;
            color: #c8dcff;
            overflow: hidden;
            border-top: 1px solid rgba(255,255,255,0.08);
            font-family: 'Roboto', sans-serif;
            white-space: pre-wrap;
            max-height: 100px;
        }

        /* Light mode overrides for stack — same palette in all modes */
        body.light .node.node-is-stack {
            background: #2b4866;
            border-color: #1e3650;
        }
        body.light .stack-ear {
            background: #2b4866;
            border-color: #1e3650;
        }
        body.light .stack-ear:hover,
        body.light .stack-ear.ear-hover {
            border-color: rgba(92,225,230,0.45);
        }
        body.light .stack-ear-eject {
            color: #5ce1e6;
        }
        body.light .stack-card {
            background: #1e3255;
        }

        /* â”€â”€ NODE â”€â”€ */
        .node {
            position: absolute;
            min-width: 120px;
            min-height: 90px;
            background: var(--node-bg);
            border: 2px solid var(--node-border);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.55), 0 8px 16px rgba(0, 0, 0, 0.35);
            transition: border-color 0.18s, box-shadow 0.18s;
            overflow: visible;
            z-index: 2;
        }

        .node>.node-inner {
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            flex: 1;
        }

        .node:hover {
            border-color: rgba(255, 255, 255, 0.26);
        }

        .node.conn-target-glow {
            border-color: rgba(180, 180, 180, 0.6) !important;
            box-shadow: 0 0 0 3px rgba(180, 180, 180, 0.1), 0 4px 28px rgba(0, 0, 0, 0.55);
        }

        .node-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 7px 8px 7px 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            flex-shrink: 0;
            cursor: grab;
            background: transparent;
            gap: 6px;
        }

        .node-header:active {
            cursor: grabbing;
        }

        /* Title input lives in the header */
        .node-title {
            flex: 0 1 55%;
            min-width: 0;
            background: none;
            border: none;
            outline: none;
            color: var(--text);
            font-family: 'Roboto', sans-serif;
            font-weight: 700;
            font-size: calc(18px * var(--zoom-inv, 1));
            cursor: text;
            padding: 0;
        }

        .node-title::placeholder {
            color: var(--placeholder-color);
            font-weight: 700;
        }

        body.light .node-title::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }


        .node-act-btn {
            background: none;
            border: none;
            color: #c0393f;
            cursor: pointer;
            padding: 8px 8px;
            /* Larger hit area */
            margin: -4px -2px -4px 0;
            /* Offset to keep layout stable */
            border-radius: 4px;
            transition: all 0.13s;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .node-act-btn:hover {
            background: rgba(255, 255, 255, 0.07);
            color: var(--text);
        }

        .dot-circle {
            display: block;
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: currentColor;
            flex-shrink: 0;
        }

        .node-body {
            flex: 1;
            padding: 10px 20px 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow: hidden;
            position: relative;
        }

        /* â”€â”€ CONTENT TYPES â”€â”€ */
        .node-text-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.035);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 9px;
            padding: 8px 10px;
            color: var(--text);
            font-family: 'Roboto', sans-serif;
            font-size: 12px;
            resize: none;
            outline: none;
            flex: 1;
            min-height: 64px;
            transition: border-color 0.13s;
        }

        .node-text-input::placeholder {
            color: var(--placeholder-color);
            opacity: 0.8;
        }

        .node-text-input:focus {
            border-color: rgba(200, 255, 0, 0.28);
        }

        body.light .node-text-input {
            background: #d9d2c8;
            color: rgba(0, 0, 0, 0.85);
        }

        body.light .node-text-input::placeholder {
            color: #0d383b;
            opacity: 1;
        }

        .node-img-area {
            width: 100%;
            flex: 1;
            min-height: 72px;
            background: rgba(255, 255, 255, 0.025);
            border: 1px solid #c0393f;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
            cursor: pointer;
            transition: all 0.13s;
            color: var(--placeholder-color);
            font-size: clamp(9.5px, 2.5%, 15px);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .node-img-area svg {
            width: clamp(22px, 9%, 56px);
            height: clamp(22px, 9%, 56px);
        }

        .node-img-area:hover {
            border-color: rgba(255, 255, 255, 0.18);
            background: rgba(255, 255, 255, 0.04);
        }

        .node-img-area img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            inset: 0;
            border-radius: 8px;
        }

        .node-img-area input {
            display: none;
        }

        .node-video-area {
            width: 100%;
            flex: 1;
            min-height: 84px;
            background: #000;
            border: 1px solid #c0393f;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .node-video-area video {
            width: 100%;
            border-radius: 10px;
            display: block;
        }

        .node-video-area .video-ph {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            color: var(--placeholder-color);
            font-size: clamp(9.5px, 2.5%, 15px);
            cursor: pointer;
            padding: 16px;
            text-align: center;
        }

        .node-video-area .video-ph svg {
            width: clamp(26px, 9%, 60px);
            height: clamp(26px, 9%, 60px);
        }

        .node-video-area input {
            display: none;
        }

        .nested-chip {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.09);
            border-radius: 5px;
            padding: 3px 9px;
            font-size: 8.5px;
            color: var(--muted);
            font-family: 'Syne', sans-serif;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .node-malik-area {
            width: 100%;
            height: 100%;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
            background: rgba(255, 255, 255, 0.025);
            border: 1.5px solid #c0393f;
            border-radius: 10px;
            padding: 8px;
            position: relative;
        }

        body.light .node-malik-area {
            background: #d9d2c8;
        }

        .malik-chat {
            flex: 1;
            overflow-y: auto;
            font-family: 'Roboto', sans-serif;
            font-size: 11.5px;
            color: var(--text);
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-right: 4px;
            margin-bottom: 5px;
        }

        .malik-chat::-webkit-scrollbar {
            width: 4px;
        }

        .malik-chat::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 2px;
        }

        .malik-msg {
            background: rgba(255, 255, 255, 0.06);
            padding: 7px 10px;
            border-radius: 7px;
            word-wrap: break-word;
            white-space: pre-wrap;
            line-height: 1.4;
        }

        .malik-msg.user {
            background: rgba(200, 255, 0, 0.1);
            align-self: flex-end;
            color: var(--text);
        }

        body.light .malik-msg.user {
            background: rgba(19, 145, 219, 0.8);
        }

        .malik-msg.ai {
            align-self: flex-start;
            border-left: 2px solid var(--accent2);
        }

        body.light .malik-msg.ai {
            background: rgba(118, 71, 212, 0.8);
            border-left: 2px solid #006eff;
        }

        .malik-msg.error {
            border-left: 2px solid #ff4444;
            color: #ffaa44;
        }

        .malik-input-wrap {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }

        .malik-input {
            flex: 1;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            color: var(--text);
            font-family: 'Roboto', sans-serif;
            font-size: 11.5px;
            padding: 6px 9px;
            outline: none;
            resize: none;
            height: 32px;
            line-height: 1.4;
        }

        .malik-input:focus {
            border-color: rgba(200, 255, 0, 0.3);
        }

        body.light .malik-input:focus {
            border-color: rgba(0, 110, 255, 0.3);
        }

        .malik-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            color: var(--text);
            cursor: pointer;
            padding: 0 12px;
            font-weight: bold;
            transition: 0.15s;
            font-size: 12px;
        }

        .malik-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        body.light .malik-btn {
            background: #197278;
            border-color: #197278;
            color: #fff;
        }

        body.light .malik-btn:hover {
            background: #1e8a91;
            border-color: #1e8a91;
        }

        .malik-settings {
            display: flex;
            flex-shrink: 0;
            margin-bottom: 2px;
        }

        .malik-key {
            width: 100%;
            background: rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 5px;
            color: var(--text);
            font-size: 9.5px;
            padding: 4px 7px;
            outline: none;
            transition: all 0.15s;
        }

        .malik-key:focus {
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.3);
        }

        .malik-key::placeholder {
            color: var(--placeholder-color);
        }

        /* â”€â”€ CONNECTION PORTS â”€â”€ */
        .conn-port {
            position: absolute;
            width: 10px;
            height: 10px;
            background: var(--port-bg);
            border: 1.5px solid var(--port-border);
            border-radius: 50%;
            cursor: crosshair;
            z-index: 20;
            opacity: 0;
            transition: opacity 0.14s, background 0.14s;
            box-shadow: none;
        }

        .node:hover .conn-port {
            opacity: 1;
            pointer-events: all;
        }

        .conn-port:hover {
            background: var(--port-hover);
        }

        .conn-port.port-right {
            right: -5px;
            top: 50%;
            transform: translateY(-50%) scale(var(--zoom-inv, 1));
        }

        .conn-port.port-left {
            left: -5px;
            top: 50%;
            transform: translateY(-50%) scale(var(--zoom-inv, 1));
        }

        .conn-port.port-top {
            top: -5px;
            left: 50%;
            transform: translateX(-50%) scale(var(--zoom-inv, 1));
        }

        .conn-port.port-bottom {
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%) scale(var(--zoom-inv, 1));
        }

        /* â”€â”€ RESIZE HANDLES â”€â”€ */
        .resize-handle {
            position: absolute;
            z-index: 15;
            opacity: 0;
            transition: opacity 0.14s;
        }

        .node:hover .resize-handle {
            opacity: 1;
        }

        .resize-handle.edge-n {
            top: -4px;
            left: 20px;
            right: 20px;
            height: 8px;
            cursor: n-resize;
        }

        .resize-handle.edge-s {
            bottom: -4px;
            left: 20px;
            right: 20px;
            height: 8px;
            cursor: s-resize;
        }

        .resize-handle.edge-e {
            right: -4px;
            top: 20px;
            bottom: 20px;
            width: 8px;
            cursor: e-resize;
        }

        .resize-handle.edge-w {
            left: -4px;
            top: 20px;
            bottom: 20px;
            width: 8px;
            cursor: w-resize;
        }

        .resize-handle.corner-nw {
            top: -5px;
            left: -5px;
            width: 14px;
            height: 14px;
            cursor: nw-resize;
        }

        .resize-handle.corner-ne {
            top: -5px;
            right: -5px;
            width: 14px;
            height: 14px;
            cursor: ne-resize;
        }

        .resize-handle.corner-se {
            bottom: -5px;
            right: -5px;
            width: 14px;
            height: 14px;
            cursor: se-resize;
        }

        .resize-handle.corner-sw {
            bottom: -5px;
            left: -5px;
            width: 14px;
            height: 14px;
            cursor: sw-resize;
        }

        .resize-handle.corner-nw::after,
        .resize-handle.corner-ne::after,
        .resize-handle.corner-se::after,
        .resize-handle.corner-sw::after {
            content: none;
        }

        /* â”€â”€ SVG CONNECTIONS â”€â”€ */
        .conn-line {
            stroke: var(--conn-color);
            stroke-width: max(2px, calc(0.8px + (1.2px / var(--zoom, 1))));
            fill: none;
            transition: stroke 0.15s, opacity 0.15s;
        }

        .conn-pulse {
            fill: var(--pulse-color);
            opacity: 0.9;
            filter: drop-shadow(0 0 0.33px var(--pulse-color));
            pointer-events: none;
            transition: opacity 0.15s;
        }

        .conn-group {
            pointer-events: none;
            /* Let the children (.conn-hitbox and .conn-del-btn) handle the pointer events */
            cursor: pointer;
        }

        .conn-hitbox {
            stroke: transparent;
            stroke-width: 14;
            /* Reduced static width for more precision */
            fill: none;
            pointer-events: stroke;
        }

        .conn-del-btn {
            opacity: 0;
            cursor: pointer;
            visibility: hidden;
            pointer-events: all;
            transition: opacity 0.15s, visibility 0s 0.15s;
        }

        .conn-group:hover .conn-del-btn {
            opacity: 1;
            visibility: visible;
            transition: opacity 0.15s 0.6s, visibility 0s 0.6s;
        }

        .conn-group:hover .conn-line {
            stroke: #ff7070;
            opacity: 0.8;
            transition: stroke 0.15s 0.6s, opacity 0.15s 0.6s;
        }

        .conn-del-btn circle {
            transition: fill 0.1s;
        }

        .conn-del-btn:hover circle {
            fill: #ff1111;
        }

        .conn-line-temp {
            stroke: var(--conn-color);
            opacity: 0.6;
            stroke-width: 1.2;
            fill: none;
            stroke-dasharray: 5 4;
            pointer-events: none;
            animation: dash-temp 1.2s linear infinite;
        }

        @keyframes dash-temp {
            to {
                stroke-dashoffset: -18;
            }
        }

        /* â”€â”€ CONTEXT MENU â”€â”€ */
        #ctx-menu {
            position: fixed;
            background: var(--bar-bg);
            border: 1px solid var(--bar-border);
            border-radius: 13px;
            padding: 5px;
            min-width: 150px;
            z-index: 2000;
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.7);
            display: none;
        }

        .ctx-item {
            padding: 7px 12px;
            font-size: 11px;
            color: var(--ctx-text);
            cursor: pointer;
            border-radius: 8px;
            transition: background 0.1s;
            font-family: 'DM Mono', monospace;
        }

        .ctx-item:hover {
            background: rgba(255, 255, 255, 0.07);
        }

        .ctx-item.danger:hover {
            background: rgba(255, 60, 60, 0.13);
            color: #ff7070;
        }

        .ctx-sep {
            height: 1px;
            background: var(--bar-border);
            margin: 4px 0;
        }

        /* â”€â”€ HUD â”€â”€ */
        #zoom-hud {
            position: fixed;
            top: 18px;
            right: 18px;
            font-size: 10px;
            color: rgba(0, 0, 0, 0.25);
            font-family: 'DM Mono', monospace;
            letter-spacing: 0.1em;
            pointer-events: none;
            z-index: 999;
        }
    </style>
</head>

<body>

    <div id="canvas-wrap">
        <div id="dot-grid"></div>
        <div id="anim-bg"></div>
        <div id="scene">
            <svg id="connections">
            </svg>
        </div>
    </div>

    <div id="toolbar">
        <div id="tb-flipcard">

            <!-- ═══ FRONT FACE ═══ -->
            <div class="tb-face tb-front">
                <div id="tb-drag-handle">
                    <svg width="10" height="18" viewBox="0 0 10 18" fill="currentColor">
                        <circle cx="1.5" cy="3" r="1.2" /><circle cx="1.5" cy="9" r="1.2" /><circle cx="1.5" cy="15" r="1.2" />
                        <circle cx="8.5" cy="3" r="1.2" /><circle cx="8.5" cy="9" r="1.2" /><circle cx="8.5" cy="15" r="1.2" />
                    </svg>
                </div>
                <button id="btn-mode-flip" onclick="toggleAnimMode()" title="Animate mode">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                        <!-- top+right arc, ends at (18,15) going downward -->
                        <path d="M5 2H14a4 4 0 0 1 4 4v9" stroke="currentColor" stroke-width="2.5" stroke-linecap="butt"/>
                        <!-- bottom+left arc, ends at (2,5) going upward -->
                        <path d="M15 18H6a4 4 0 0 1-4-4V5" stroke="currentColor" stroke-width="2.5" stroke-linecap="butt"/>
                        <!-- arrowhead pointing Down at (18,15) -->

    <script>
        // â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
        //  STATE
        // â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
        // ── Last session: 2026-03-12  ·  Claude Sonnet ───────────────────────
        // Completed: stack ear z-index lock (CSS + resize handler), card labels
        // now show title/"Untitled", animated single-eject (spring to centre →
        // fills viewport height → glides to varied resting spots, random scale
        // & pace, ~7% reversal), custom magnet SVG in empty-state hints.
        // Next: toolbar button logic (K-FRAME, ZOOM, FLIP, SPAWN, + , etc.)
        // ─────────────────────────────────────────────────────────────────────

        let nodes = [];
        let connections = [];
        let nid = 0, cid = 0;
        let pan = { x: 0, y: 0 }, zoom = 1;
        let addMode = null;
        let zoomModeActive = false, zoomTarget = null;
        let flipModeActive = false;
        let draggingConn = false, connSrcId = null, connTempPath = null, connSrcDir = null;
        let focusedStackId = null;
        let kframeActive = false, kframeSnapshot = null;
        let clickReady = false;
        let ctxTarget = null;

        // ---------- DB SETUP ----------
        const DB_NAME = 'InfiniteCanvasDB';
        let db;
        const req = indexedDB.open(DB_NAME, 1);
        req.onupgradeneeded = e => {
            db = e.target.result;
            if (!db.objectStoreNames.contains('state')) db.createObjectStore('state');
        };
        req.onsuccess = e => {
            db = e.target.result;
            loadState();
        };
        // ═══════════════════════════════════════════════
        //  UNDO / REDO
        // ═══════════════════════════════════════════════
        const MAX_HISTORY = 50;
        let historyStack = [];
        let histIdx = -1;
        let _inUndoRedo = false;

        function pushHistory(stateSnap) {
            const snap = JSON.parse(JSON.stringify(stateSnap));
            historyStack.splice(histIdx + 1); // truncate redo branch
            historyStack.push(snap);
            if (historyStack.length > MAX_HISTORY) historyStack.shift();
            histIdx = historyStack.length - 1;
        }

        function applyHistoryState(state) {
            _inUndoRedo = true;
            // Preserve camera — undo/redo should not move the viewport
            const savedPan = { ...pan };
            const savedZoom = zoom;
            // Clear current scene
            nodes.forEach(n => {
                document.getElementById('node-' + n.id)?.remove();
                document.getElementById('stack-ear-' + n.id)?.remove();
            });
            connections.forEach(c => {
                document.getElementById('conn-group-' + c.id)?.remove();
                c.pulses?.forEach(p => p.el?.remove());
            });
            connections = [];
            nodes = [];
            // Restore
            restoreState(JSON.parse(JSON.stringify(state)));
            // Put camera back (restoreState overwrites pan/zoom)
            pan = savedPan;
            zoom = savedZoom;
            applyTransform();
            updateDotGrid();
            const zh = document.getElementById('zoom-hud');
            if (zh) zh.textContent = Math.round(zoom * 100) + '%';
            saveState(true); // persist to DB without pushing history
            _inUndoRedo = false;
        }

        function undo() {
            if (histIdx <= 0) return;
            histIdx--;
            applyHistoryState(historyStack[histIdx]);
        }

        function redo() {
            if (histIdx >= historyStack.length - 1) return;
            histIdx++;
            applyHistoryState(historyStack[histIdx]);
        }

        document.addEventListener('keydown', e => {
            if (e.key.toLowerCase() === 'z' && e.ctrlKey && !e.shiftKey) { e.preventDefault(); undo(); }
            if (e.key.toLowerCase() === 'z' && e.ctrlKey && e.shiftKey) { e.preventDefault(); redo(); }
        });

        function saveState(skipHistory = false) {
            if (!db) return;
            nodes.forEach(n => {
                const el = document.getElementById('node-' + n.id);
                if (!el) return;

                // Save grouping hierarchy
                if (el.classList.contains('in-group')) {
                    const groups = nodes.filter(gn => gn.type === 'container');
                    let foundGroup = false;
                    for (let g of groups) {
                        if (n.parentId === g.id) {
                            n.parentId = g.id;
                            foundGroup = true;
                            break;
                        }
                    }
                    if (!foundGroup) {
                        n.parentId = null;
                        el.classList.remove('in-group');
                    }
                } else {
                    n.parentId = null;
                }

                const titleInput = el.querySelector('.node-title');
                if (titleInput) n.title = titleInput.value;
                if (n.type === 'text') {
                    const txt = el.querySelector('.node-text-input');
                    if (txt) n.text = txt.value;
                } else if (n.type === 'image') {
                    const img = el.querySelector('.node-img-area img');
                    if (img && img.src) n.src = img.src;
                } else if (n.type === 'video') {
                    const vid = el.querySelector('.node-video-area video');
                    if (vid && vid.src) n.src = vid.src;
                } else if (n.type === 'malik') {
                    const chat = el.querySelector('.malik-chat');
                    if (chat) n.chatHTML = chat.innerHTML;
                } else if (n.type === 'html') {
                    const code = el.querySelector('.node-html-code');
                    if (code) n.code = code.value;
                }
            });

            const tbLogoEl = document.getElementById('tb-logo');
            let tbLogoData = null;
            if (tbLogoEl && tbLogoEl.classList.contains('has-logo')) {
                tbLogoData = tbLogoEl.style.backgroundImage;
            }

            const state = {
                nodes,
                connections: connections.map(c => ({ id: c.id, from: c.from, to: c.to })),
                pan, zoom, nid, cid,
                tbLogo: tbLogoData
            };

            if (!skipHistory && !_inUndoRedo) pushHistory(state);

            const tx = db.transaction('state', 'readwrite');
            tx.objectStore('state').put(state, 'canvas_data');
        }

        function restoreState(state) {
            nodes = state.nodes || [];
            pan = state.pan || { x: 0, y: 0 };
            zoom = state.zoom || 1;
            nid = state.nid || 0;
            cid = state.cid || 0;

            if (state.tbLogo) {
                ['tb-logo', 'tb-logo-b'].forEach(id => {
                    const el = document.getElementById(id);
                    if (!el) return;
                    el.style.backgroundImage = state.tbLogo;
                    el.style.borderColor = 'transparent';
                    el.classList.add('has-logo');
                });
            }

            nodes.forEach(data => {
                mountNode(data);
                const el = document.getElementById('node-' + data.id);
                if (!el) return;

                if (data.type === 'container') {
                    el.classList.add('node-is-group');
                }
                if (data.parentId) {
                    el.classList.add('in-group');
                    el.style.zIndex = 5;
                }

                if (data.title) {
                    const t = el.querySelector('.node-title');
                    if (t) t.value = data.title;
                }
                if (data.type === 'text' && data.text) {
                    const t = el.querySelector('.node-text-input');
                    if (t) t.value = data.text;
                }
                if (data.type === 'image' && data.src) {
                    const area = el.querySelector('.node-img-area');
                    if (area) {
                        let img = document.createElement('img');
                        img.src = data.src;
                        area.appendChild(img);
                        area.querySelectorAll('span,svg').forEach(s => s.style.display = 'none');
                    }
                }
                if (data.type === 'video' && data.src) {
                    const area = el.querySelector('.node-video-area');
                    if (area) {
                        const ph = area.querySelector('.video-ph');
                        if (ph) ph.style.display = 'none';
                        let vid = document.createElement('video');
                        vid.controls = true;
                        vid.src = data.src;
                        area.appendChild(vid);
                    }
                }
                if (data.type === 'malik' && data.chatHTML) {
                    const chat = el.querySelector('.malik-chat');
                    if (chat) chat.innerHTML = data.chatHTML;
                }
                if (data.type === 'html' && data.code) {
                    const code = el.querySelector('.node-html-code');
                    if (code) code.value = data.code;
                }
            });

            if (state.connections) {
                state.connections.forEach(c => addConnection(c.from, c.to, c.id));
            }

            applyTransform();
            updateDotGrid();
            const zh = document.getElementById('zoom-hud');
            if (zh) zh.textContent = Math.round(zoom * 100) + '%';
        }

        function loadState() {
            const tx = db.transaction('state', 'readonly');
            const req = tx.objectStore('state').get('canvas_data');
            req.onsuccess = () => {
                if (req.result && Object.keys(req.result).length > 0) {
                    restoreState(req.result);
                } else {
                    setupDefaultBoard();
                }
            };
        }

        function setupDefaultBoard() {
            createNode('text', 180, 110);
            createNode('image', 440, 110);
            createNode('video', 180, 400);
            saveState();
        }

        function newBoard() {
            if (!confirm('This will clear the current canvas. Make sure you have saved your work to a file if you want to keep it. Continue?')) return;
            // Clear current state
            nodes.forEach(n => {
                document.getElementById('node-' + n.id)?.remove();
                document.getElementById('stack-ear-' + n.id)?.remove();
            });
            connections.forEach(c => {
                document.getElementById('conn-group-' + c.id)?.remove();
                c.pulses.forEach(p => p.el.remove());
            });
            nodes = [];
            connections = [];
            nid = 0; cid = 0;
            pan = { x: 0, y: 0 }; zoom = 1;

            // Reset UI
            const tbLogoEl = document.getElementById('tb-logo');
            if (tbLogoEl) {
                tbLogoEl.style.backgroundImage = '';
                tbLogoEl.style.borderColor = '';
                tbLogoEl.classList.remove('has-logo');
            }
            applyTransform();
            updateDotGrid();

            // Add a single welcoming text node or just leave empty
            createNode('text', window.innerWidth / 2 - 100, window.innerHeight / 2 - 75);
            saveState();
            historyStack = []; histIdx = -1;
        }

        function exportToFile() {
            // Force a save to update all n.text, n.title, etc attributes in the nodes array
            saveState();

            // Re-read current state to ensure it's fresh
            const tx = db.transaction('state', 'readonly');
            const req = tx.objectStore('state').get('canvas_data');
            req.onsuccess = () => {
                const dataStr = JSON.stringify(req.result, null, 2);
                const blob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `infinite_canvas_${new Date().toISOString().replace(/[:.]/g, '-')}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            };
        }

        function importFromFile() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = ev => {
                const file = ev.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = e => {
                    try {
                        const state = JSON.parse(e.target.result);
                        if (!state.nodes) throw new Error('Invalid canvas file');

                        // Clear current
                        nodes.forEach(n => {
                            document.getElementById('node-' + n.id)?.remove();
                            document.getElementById('stack-ear-' + n.id)?.remove();
                        });
                        connections.forEach(c => {
                            document.getElementById('conn-group-' + c.id)?.remove();
                            c.pulses.forEach(p => p.el.remove());
                        });

                        restoreState(state);
                        saveState();
                    } catch (err) {
                        alert('Error loading file: ' + err.message);
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        const wrap = document.getElementById('canvas-wrap');
        const scene = document.getElementById('scene');
        const svgEl = document.getElementById('connections');
        const zoomHud = document.getElementById('zoom-hud');
        const ctxMenu = document.getElementById('ctx-menu');

        // â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
        //  PAN / ZOOM
        // â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
        // ══════════════════════════════════════════════════════════════════════
        //  PAN / ZOOM & MULTI-SELECT
        // ══════════════════════════════════════════════════════════════════════
        let isPanning = false, panStart = { x: 0, y: 0 };
        let selecting = false, selStart = { x: 0, y: 0 };
        const selBox = document.getElementById('selection-box');

        wrap.addEventListener('mousedown', e => {
            if (e.target.closest('.node,.node-inner,#toolbar,#ctx-menu')) return;
            // Middle click (button 1) while group add mode is active starts selection
            if (e.button === 1 && addMode === 'group') {
                selecting = true;
                selStart = { x: e.clientX, y: e.clientY };
                selBox.style.left = e.clientX + 'px';
                selBox.style.top = e.clientY + 'px';
                selBox.style.width = '0px';
                selBox.style.height = '0px';
                selBox.style.display = 'block';
                return;
            }
            if (e.button === 0) { // Only pan on left click
                isPanning = true;
                panStart = { x: e.clientX - pan.x, y: e.clientY - pan.y };
                wrap.classList.add('panning');
            }
        });

        window.addEventListener('mousemove', e => {
            if (isPanning) {
                pan.x = e.clientX - panStart.x;
                pan.y = e.clientY - panStart.y;
                applyTransform(); updateDotGrid();
            }
            if (selecting) {
                const x = Math.min(e.clientX, selStart.x);
                const y = Math.min(e.clientY, selStart.y);
                const w = Math.abs(e.clientX - selStart.x);
                const h = Math.abs(e.clientY - selStart.y);
                selBox.style.left = x + 'px';
                selBox.style.top = y + 'px';
                selBox.style.width = w + 'px';
                selBox.style.height = h + 'px';
            }
            if (draggingConn && connTempPath) {
                const sp = nodeEdgePoint(connSrcId, connSrcDir || 'right');
                const mp = clientToScene(e.clientX, e.clientY); // SVG is in scene space
                connTempPath.setAttribute('d', bezier(sp, mp, connSrcDir || 'right', null));
                // highlight potential targets
                nodes.forEach(n => {
                    if (n.id === connSrcId) return;
                    const el = document.getElementById('node-' + n.id);
                    if (!el) return;
                    const near = mp.x > n.x - 60 && mp.x < n.x + n.w + 60 && mp.y > n.y - 60 && mp.y < n.y + n.h + 60;
                    el.classList.toggle('conn-target-glow', near);
                });
            }
        });

        window.addEventListener('mouseup', e => {
            if (isPanning) {
                isPanning = false;
                wrap.classList.remove('panning');
                saveState();
            }
            if (selecting) {
                selecting = false;
                selBox.style.display = 'none';
                try {
                    handleGroupSelection(selStart, { x: e.clientX, y: e.clientY });
                } catch (err) {
                    console.error("Selection error:", err);
                }
            }
            if (draggingConn) finishConnection(e);
        });

        function handleGroupSelection(start, end) {
            // Convert to true scene coordinates
            const s1 = clientToScene(start.x, start.y);
            const s2 = clientToScene(end.x, end.y);

            const minX = Math.min(s1.x, s2.x);
            const maxX = Math.max(s1.x, s2.x);
            const minY = Math.min(s1.y, s2.y);
            const maxY = Math.max(s1.y, s2.y);

            // Avoid creating empty tiny groups accidentally
            if (maxX - minX < 20 || maxY - minY < 20) return;

            // Find nodes completely within this box
            const capturedNodes = nodes.filter(n => {
                // Ignore other group containers to prevent complex nesting for now
                if (n.type === 'container') return false;
                // Don't capture nodes already in a group initially to keep logic simple
                if (n.parentId) return false;

                const cx = n.x + n.w / 2;
                const cy = n.y + n.h / 2;
                // Capture if center is within bounds
                return cx >= minX && cx <= maxX && cy >= minY && cy <= maxY;
            });

            if (capturedNodes.length > 0) {
                // Anti-eclipse: stagger captured nodes if they are exactly on top of each other
                for (let i = 0; i < capturedNodes.length; i++) {
                    for (let j = i + 1; j < capturedNodes.length; j++) {
                        const n1 = capturedNodes[i], n2 = capturedNodes[j];
                        if (Math.abs(n1.x - n2.x) < 20 && Math.abs(n1.y - n2.y) < 20) {
                            n2.x += 40;
                            n2.y += 40;
                            const el2 = document.getElementById('node-' + n2.id);
                            if (el2) {
                                el2.style.left = n2.x + 'px';
                                el2.style.top = n2.y + 'px';
                            }
                        }
                    }
                }

                // Create Group Node bounds that tightly wrap children + padding
                const PAD = 40;
                let gx1 = Infinity, gy1 = Infinity, gx2 = -Infinity, gy2 = -Infinity;
                capturedNodes.forEach(n => {
                    gx1 = Math.min(gx1, n.x);
                    gy1 = Math.min(gy1, n.y);
                    gx2 = Math.max(gx2, n.x + n.w);
                    gy2 = Math.max(gy2, n.y + n.h);
                });

                const gw = (gx2 - gx1) + PAD * 2;
                const gh = (gy2 - gy1) + PAD * 2 + 30; // Extra padding for header

                const groupId = createNode('container', gx1 - PAD, gy1 - PAD - 30);
                const gNode = nodes.find(n => n.id === groupId);
                gNode.w = gw;
                gNode.h = gh;

                const gEl = document.getElementById('node-' + groupId);
                gEl.style.width = gw + 'px';
                gEl.style.height = gh + 'px';
                gEl.classList.add('node-is-group');

                // Parent them correctly visually and logically
                capturedNodes.forEach(cn => {
                    cn.parentId = groupId;
                    cn.rx = cn.x - gNode.x; // relative X
                    cn.ry = cn.y - gNode.y; // relative Y

                    const el = document.getElementById('node-' + cn.id);
                    el.style.zIndex = 5; // Ensure children sit above parent (z-index 1 usually)
                    el.classList.add('in-group');
                });

                // Update ALL connections after moving any staggered nodes
                redrawConnections();
                saveState();
            }

            setAddMode(null); // Turn off tool
        }

        wrap.addEventListener('wheel', e => {
            if (e.target.closest('.malik-chat, .malik-input, .node-text-input')) return;
            e.preventDefault();
            const factor = e.deltaY < 0 ? 1.1 : 0.909;
            const nz = Math.min(Math.max(zoom * factor, 0.07), 5);
            pan.x = e.clientX - (e.clientX - pan.x) * (nz / zoom);
            pan.y = e.clientY - (e.clientY - pan.y) * (nz / zoom);
            zoom = nz;
            applyTransform(); updateDotGrid();
            zoomHud.textContent = Math.round(zoom * 100) + '%';
            redrawConnections();
            clearTimeout(window.zoomSaveTimeout);
            window.zoomSaveTimeout = setTimeout(() => saveState(true), 500);
        }, { passive: false });

        // ── Ear zoom compensation ──────────────────────────────────────────
        // The ear is a child of the scene and scales with it. Below zoom=0.4 we
        // counter-scale each ear so it never shrinks smaller than its 40%-zoom size.
        // transform-origin: 0% 0% anchors the top-left corner, so the gap to the
        // node and the alignment with the node top are both preserved exactly.
        function updateEarScale(ear) {
            const s = zoom < 0.4 ? 0.4 / zoom : 1;
            if (s > 1) {
                ear.style.transform       = `scale(${s.toFixed(5)})`;
                ear.style.transformOrigin = '0% 0%';
            } else {
                ear.style.transform       = '';
                ear.style.transformOrigin = '';
            }
        }
        function updateAllEarScales() {
            document.querySelectorAll('.stack-ear').forEach(updateEarScale);
        }

        function applyTransform() {
            scene.style.transform = `translate(${pan.x}px,${pan.y}px) scale(${zoom})`;
            document.documentElement.style.setProperty('--zoom-inv', zoom < 1 ? 1 / Math.pow(zoom, 0.6) : (zoom > 1 ? 1 / Math.pow(zoom, 0.6) : 1));
            document.documentElement.style.setProperty('--zoom', zoom);
            updateAllEarScales();
        }
        function updateDotGrid() {
            // Scale the dot spacing deceptively. Less aggressive than before (0.65 vs 0.4) 
            // so they can come closer and reduce blending jumpiness.
            let deceptiveZoom = zoom;
            if (zoom < 1) deceptiveZoom = Math.pow(zoom, 0.65);

            const s = 32 * deceptiveZoom;
            const ox = ((pan.x % s) + s) % s, oy = ((pan.y % s) + s) % s;
            const gridEl = document.getElementById('dot-grid');

            gridEl.style.backgroundSize = `${s}px ${s}px`;
            gridEl.style.backgroundPosition = `${ox}px ${oy}px`;

            // Calculate opacity: 1.0 down to 0.4 zoom, then fade to 0.6 at 0.07 zoom
            let opacity = 1;
            if (zoom < 0.4) {
                // Map [0.07, 0.4] -> [0.6, 1.0]
                const factor = (zoom - 0.07) / (0.4 - 0.07);
                opacity = 0.6 + (0.4 * factor);
            }
            gridEl.style.opacity = Math.max(0.6, Math.min(1, opacity));

            // Adjust the dot radius size visually
            const dotSize = Math.max(1, 1.5 * deceptiveZoom);
            gridEl.style.backgroundImage = `radial-gradient(circle, var(--dot-color) ${dotSize}px, transparent ${dotSize}px)`;

            // ── Animate-mode tiled background: pan fully, zoom as parallax ──
            const animBg = document.getElementById('anim-bg');
            if (animBg) {
                const baseSize = 140;
                // Dampened zoom: power 0.3 means it barely scales compared to nodes
                const dampedZoom = Math.pow(zoom, 0.3);
                const tileSize = baseSize * dampedZoom;
                // Pan 1:1 with canvas, wrapped to tile size
                const abx = ((pan.x % tileSize) + tileSize) % tileSize;
                const aby = ((pan.y % tileSize) + tileSize) % tileSize;
                animBg.style.backgroundSize = `${tileSize}px`;
                animBg.style.backgroundPosition = `${abx}px ${aby}px`;
            }
        }
        function clientToScene(cx, cy) {
            const r = wrap.getBoundingClientRect();
            return { x: (cx - r.left - pan.x) / zoom, y: (cy - r.top - pan.y) / zoom };
        }
        function resetView() {
            if (nodes.length === 0) {
                pan = { x: 0, y: 0 }; zoom = 1;
            } else {
                let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
                nodes.forEach(n => {
                    const el = document.getElementById('node-' + n.id);
                    if (el && el.classList.contains('node-is-group')) { return; } // Optionally exclude groups if bounds get messy, but including them is fine.
                    if (n.x < minX) minX = n.x;
                    if (n.y < minY) minY = n.y;
                    if ((n.x + n.w) > maxX) maxX = n.x + n.w;
                    if ((n.y + n.h) > maxY) maxY = n.y + n.h;
                });

                // If minX is still Infinity, it means there are no valid nodes to frame
                if (minX === Infinity) {
                    pan = { x: 0, y: 0 }; zoom = 1;
                } else {
                    const padding = 120;
                    const width = maxX - minX + padding * 2;
                    const height = maxY - minY + padding * 2;
                    const zoomX = window.innerWidth / width;
                    const zoomY = window.innerHeight / height;
                    zoom = Math.min(zoomX, zoomY, 2); // Cap zoom at 2x
                    // Center the bounding box
                    const cx = minX + (width - padding * 2) / 2;
                    const cy = minY + (height - padding * 2) / 2;
                    pan.x = window.innerWidth / 2 - cx * zoom;
                    pan.y = window.innerHeight / 2 - cy * zoom;
                }
            }

            const zh = document.getElementById('zoom-hud');
            if (zh) zh.textContent = Math.round(zoom * 100) + '%';
            applyTransform(); updateDotGrid();
            saveState();
        }

        // ———————————————————————————————————————————————————————————
        //  ADD MODE
        // ———————————————————————————————————————————————————————————
        wrap.addEventListener('mousedown', e => {
            if (e.target.closest('.node,.node-inner,#toolbar')) return;
            // Group tool is handled entirely by the middle-click drag system, not here
            if (addMode === 'group') return;
            if (e.button !== 0) return; // Non-group tools need left click
            clickReady = !!addMode;
        });
        wrap.addEventListener('mouseup', e => {
            if (e.target.closest('.node,.node-inner,#toolbar')) return;
            if (!addMode || !clickReady) return;
            // Group tool is handled entirely by the middle-click drag system
            if (addMode === 'group') return;
            if (e.button !== 0) return;

            clickReady = false;
            const pos = clientToScene(e.clientX, e.clientY);
            const newId = createNode(addMode, pos.x - 100, pos.y - 75);

            // Allow newly placed node to be captured by group container
            const newNode = nodes.find(n => n.id === newId);
            if (newNode && newNode.type !== 'container') {
                handleNodeDropOverlap(newNode);
            }

            // Deactivate after placing exactly one node
            setAddMode(null);
        });

        function setAddMode(type) {
            addMode = addMode === type ? null : type;
            document.querySelectorAll('.tb-btn').forEach(b => b.classList.remove('active'));
            if (addMode) document.getElementById('btn-' + addMode).classList.add('active');
            wrap.classList.toggle('adding', !!addMode);
        }

        // â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
        //  CREATE NODE
        // â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•

            const h = type === 'html' ? 280 : 170;

            nodes.push(data);
            mountNode(data);
            return id;
        }

    <div class="resize-handle edge-n"    data-nid="${data.id}" data-dir="n"></div>

    <div class="resize-handle edge-w"    data-nid="${data.id}" data-dir="w"></div>
    <div class="resize-handle corner-nw" data-nid="${data.id}" data-dir="nw"></div>
    <div class="resize-handle corner-ne" data-nid="${data.id}" data-dir="ne"></div>

    <div class="resize-handle corner-sw" data-nid="${data.id}" data-dir="sw"></div>
  `;

            if (data.type === 'stack') el.classList.add('node-is-stack');
            if (data.flipped) el.classList.add('node-flipped');

            scene.appendChild(el);
            scene.appendChild(svgEl); // keep SVG last so lines paint above nodes

            // Satellite ear for stack nodes
            if (data.type === 'stack') {
                const ear = document.createElement('div');
                ear.className = 'stack-ear';
                ear.id = 'stack-ear-' + data.id;
                ear.dataset.nid = data.id;
                ear.innerHTML = `
                  <div class="stack-ear-grab"></div>
                  <button class="stack-ear-eject" title="Eject top node (Ctrl+E)" onmousedown="event.stopPropagation()" onclick="ejectOneFromStack(${data.id})">
                    <svg viewBox="0 0 16 16" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                      <path d="M8 2L13.5 9.5H2.5L8 2Z"/>
                      <rect x="2.5" y="11.5" width="11" height="2" rx="1"/>
                    </svg>
                  </button>
                `;
                ear.style.left = (data.x + data.w + 10) + 'px';
                ear.style.top  = data.y + 'px';
                scene.insertBefore(ear, svgEl);
                updateEarScale(ear);
                makeEarDraggable(ear, el, data);
            }

            makeDraggable(el, data);
            if (data.type !== 'stack') initPorts(el);
            initResizeHandles(el, data);
        }

        function nodeContent(type, id) {
            if (type === 'text') return `<textarea class="node-text-input" placeholder="Type something..." onmousedown="event.stopPropagation()" oninput="saveState(true)" onblur="saveState()"></textarea>`;
            if (type === 'malik') return `
    <div class="node-malik-area">

            if (type === 'image') return `

            if (type === 'video') return `
    <div class="node-video-area">

        <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
          <rect x="2" y="5" width="16" height="16" rx="3" stroke="currentColor" stroke-width="1.4"/>
          <path d="M18 10l6-3v12l-6-3V10z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
        </svg>
        <span>right-click to upload</span>
      </div>
      <input type="file" accept="video/*" onchange="loadVid(event,this)">
    </div>`;
